<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>2048</title>
  <link href="https://cdn.jsdelivr.net/gh/gabrielecirulli/2048@master/style/main.css" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <style>body{margin:0;background:#faf8ef;}</style>
</head>
<body>
  <div class="container">
    <div class="heading">
      <h1 class="title">2048</h1>
      <div class="scores-container">
        <div class="score-container">0</div>
        <div class="best-container">0</div>
      </div>
    </div>
    <div class="above-game">
      <p class="game-intro">Join the numbers and get to the <strong>2048 tile!</strong></p>
      <a class="restart-button">New Game</a>
    </div>
    <div class="game-container">
      <div class="game-message"><p></p><div class="lower"><a class="keep-playing-button">Keep going</a><a class="retry-button">Try again</a></div></div>
      <div class="grid-container">
        <div class="grid-row"><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div></div>
        <div class="grid-row"><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div></div>
        <div class="grid-row"><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div></div>
        <div class="grid-row"><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div></div>
      </div>
      <div class="tile-container"></div>
    </div>
    <p class="game-explanation"><strong class="important">How to play:</strong> Use your <strong>arrow keys</strong> to move the tiles.</p>
  </div>
  <script src="https://cdn.jsdelivr.net/gh/gabrielecirulli/2048@master/js/bind_polyfill.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/gabrielecirulli/2048@master/js/classlist_polyfill.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/gabrielecirulli/2048@master/js/animframe_polyfill.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/gabrielecirulli/2048@master/js/keyboard_input_manager.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/gabrielecirulli/2048@master/js/html_actuator.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/gabrielecirulli/2048@master/js/grid.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/gabrielecirulli/2048@master/js/tile.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/gabrielecirulli/2048@master/js/local_storage_manager.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/gabrielecirulli/2048@master/js/game_manager.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/gabrielecirulli/2048@master/js/application.js"></script>
</body>
</html>
