<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spacewaves</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #fff;
        }
        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>
    <iframe src="https://spacewaves.io/" onload="hideElements()" allowfullscreen></iframe>

    <script>
        function hideElements() {
            try {
                const iframe = document.querySelector('iframe');
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;

                // Hide common header/navigation elements
                const selectorsToHide = [
                    'header',
                    '.header',
                    'nav',
                    '.navbar',
                    '.navigation',
                    '.menu',
                    '.top-bar',
                    '.banner',
                    '.alert',
                    '#header',
                    '#nav',
                    '#menu',
                    '.ad',
                    '.ads',
                    '.advertisement',
                    '.sidebar',
                    '.footer',
                    '#footer',
                    'script[src*="adsbygoogle"]',
                    '#Ads1',
                    '#AdsInGame',
                    '.ads_loadding_text',
                    '.ads_inGame',
                    'div[style*="Advertisement"]'
                ];

                selectorsToHide.forEach(selector => {
                    try {
                        const elements = iframeDoc.querySelectorAll(selector);
                        elements.forEach(el => {
                            el.style.display = 'none';
                        });
                    } catch (e) {
                        // Ignore errors for cross-origin restrictions
                    }
                });

                // Try to make the main content full screen
                try {
                    const body = iframeDoc.body;
                    const html = iframeDoc.documentElement;
                    body.style.margin = '0';
                    body.style.padding = '0';
                    html.style.margin = '0';
                    html.style.padding = '0';
                    body.style.overflow = 'hidden';
                } catch (e) {
                    // Ignore cross-origin errors
                }

            } catch (e) {
                // Cross-origin restrictions may prevent this
                console.log('Could not modify iframe content due to cross-origin restrictions');
            }
        }
    </script>
</body>
</html>
