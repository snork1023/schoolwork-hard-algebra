<!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="utf-8">
<title>Space Waves</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/game/space-wave/TemplateData/style.css">
</head>
<body>
<div id="unity-container"><canvas id="unity-canvas"></canvas></div>
<div id="loading-cover" style="display:none;">
  <div id="unity-loading-bar">
    <div id="unity-logo"><img src="/game/space-wave/logo.png"></div>
    <div id="unity-progress-bar-empty" style="display: none; background: none;margin: 5px !important;">
      <div id="unity-progress-bar-full" style="margin-top:0px "></div>
    </div>
    <div class="spinner"></div>
  </div>
</div>

<script src="/game/space-wave/microsoftDataMigrationDO.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
 microsoftMigration();
 });
 
 window.addEventListener("PlayerPrefsReady", () => {
 migratePlayerPrefs();
 });

window.addEventListener("load", function () {
 if ("serviceWorker" in navigator) {
 navigator.serviceWorker.register("ServiceWorker.js");
 }
 });
 
 const container = document.querySelector("#unity-container");
 const canvas = document.querySelector("#unity-canvas");
 const loadingCover = document.querySelector("#loading-cover");
 const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
 const progressBarFull = document.querySelector("#unity-progress-bar-full");
 const spinner = document.querySelector('.spinner');

 const buildUrl = "https://slope3.com/game/space-wave/Build";
 const loaderUrl = buildUrl + "/dae5c7bd2b15915f51ae4e56b8f5367d.loader.js";
 const config = {
 dataUrl: buildUrl + "/568ea6b3af616bd57f419c508c933303.data.unityweb",
 frameworkUrl: buildUrl + "/c699bc4c24abfbdb4c8b3e15b0af7d3f.framework.js.unityweb",
 codeUrl: buildUrl + "/7fb5141de5923189bc1dc5f94eb619f2.wasm.unityweb",
 streamingAssetsUrl: "StreamingAssets",
 companyName: "do.Games",
 productName: "Space Waves",
 productVersion: "1.1.2-ms",
 matchWebGLToCanvasSize: "false"
 };
 
 loadingCover.style.display = "";
 
 var needMigrate = false;
 var gameInstance;
 var script = document.createElement("script");
 script.src = loaderUrl;
 script.onload = () => {
 createUnityInstance(canvas, config, (progress) => {
     spinner.style.display = "none";
     progressBarEmpty.style.display = "";
     progressBarFull.style.width = 100 * progress + "%";
 }).then((unityInstance) => {
     console.log("<do.G> Unity inited");
     gameInstance = unityInstance;
     loadingCover.style.display = "none";
     resizeCanvas();
     
     if (needMigrate) {
        needMigrate = false;
        gameInstance.SendMessage('MSStartSDK', 'OnMigratePlayerPrefs', window["fetchPlayerPrefs"]);
     }
     
 }).catch((message) => {
 alert(message);
 });
 };
 document.body.appendChild(script);
 
 // Focus
 function setFocus() {
     container.focus();
     window.focus();
     canvas.focus();
 }

 window.addEventListener("touchstart", () => {
     setFocus();
 });
 window.addEventListener("pointerdown", () => {
     setFocus();
 });
 window.addEventListener("resize", () => {
     setFocus();
     resizeCanvas();
 });
 
 function resizeCanvas() {
     var pixelRatio = window.devicePixelRatio || 1;
     var width = canvas.clientWidth * pixelRatio;
     var height = canvas.clientHeight * pixelRatio;
         
     if (canvas.width != width || canvas.height != height) {
         if (height > 1080) {
             canvas.width = Math.floor(width / height * 1080);
             canvas.height = 1080;
         }
         else
         {
             canvas.width = width;
             canvas.height = height;
         }
     }
 }
 
 function migratePlayerPrefs() {
 if (typeof gameInstance !== 'undefined') {
     gameInstance.SendMessage('MSStartSDK', 'OnMigratePlayerPrefs', window["fetchPlayerPrefs"]);
    } else {
     needMigrate = true;
 }
 }
</script>
</body>
</html>
