<html lang="en-US">

<head>
  <title>Geometry Dash</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta name="description" content="Play Geometry Dash Lite Online For Free on Chromebook, PC, Windows, Desktop in Chrome and modern browsers.">
  <meta name="robots" content="noindex, nofollow">
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
  <style>
    html {
      box-sizing: border-box;
    }

    *,
    *:before,
    *:after {
      box-sizing: inherit;
    }

    body {
      margin: 0;
      background-image: linear-gradient(rgb(0, 0, 0), rgb(0, 102, 255));
      overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    #gameContainer {
      width: 100vw;
      height: 100vh;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: linear-gradient(rgb(0, 0, 0), rgb(0, 102, 255));
      z-index: 10;
      padding: 24px;
    }

    .loader-inner {
      width: min(520px, 92vw);
      text-align: center;
      color: #fff;
    }

    .loader-title {
      font-weight: 700;
      letter-spacing: 0.02em;
      font-size: 20px;
      margin-bottom: 14px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
    }

    .loader-bar {
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    #progressFill {
      height: 100%;
      width: 100%;
      transform: scaleX(0);
      transform-origin: left center;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.45));
      transition: transform 120ms linear;
    }

    #progressText {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.9;
    }

    #loaderError {
      margin-top: 14px;
      font-size: 12px;
      opacity: 0.85;
      line-height: 1.4;
    }
  </style>

  <div id="gameContainer"></div>

  <div id="loader" role="status" aria-live="polite">
    <div class="loader-inner">
      <div class="loader-title">Loading Geometry Dash…</div>
      <div class="loader-bar" aria-hidden="true">
        <div id="progressFill"></div>
      </div>
      <div id="progressText">0%</div>
      <div id="loaderError" hidden></div>
    </div>
  </div>

  <script src="Build/UnityLoader.js"></script>
  <script>
    (function () {
      const loader = document.getElementById("loader");
      const progressFill = document.getElementById("progressFill");
      const progressText = document.getElementById("progressText");
      const loaderError = document.getElementById("loaderError");

      function showError(message) {
        if (!loaderError) return;
        loaderError.hidden = false;
        loaderError.textContent = message;
      }

      function setStageText(message) {
        if (progressText) progressText.textContent = message;
      }

      function UnityProgress(gameInstance, progress) {
        if (progressFill) progressFill.style.transform = `scaleX(${progress})`;
        if (progressText) progressText.textContent = `${Math.round(progress * 100)}%`;

        if (progress === 1 && !gameInstance.removeTimeout) {
          gameInstance.removeTimeout = setTimeout(function () {
            if (loader) loader.style.display = "none";
          }, 800);
        }
      }

      async function fetchArrayBuffer(url) {
        const res = await fetch(url, { mode: "cors" });
        if (!res.ok) throw new Error(`${res.status} ${res.statusText} - ${url}`);
        return await res.arrayBuffer();
      }

      function concatArrayBuffers(buffers) {
        const total = buffers.reduce((sum, b) => sum + b.byteLength, 0);
        const out = new Uint8Array(total);
        let offset = 0;
        for (const b of buffers) {
          out.set(new Uint8Array(b), offset);
          offset += b.byteLength;
        }
        return out.buffer;
      }

      async function start() {
        if (typeof UnityLoader === "undefined" || !UnityLoader.instantiate) {
          showError("UnityLoader failed to load.");
          return;
        }

        // jsDelivr blocks these .unityweb files (>50MB). We rebuild them from the GitHub split parts.
        const remoteBase = "https://raw.githubusercontent.com/bubbls/UGS-Assets/main/gdlite/Build/";

        setStageText("Preparing game files…");

        const [data1, data2, wasmCode1, wasmFramework1] = await Promise.all([
          fetchArrayBuffer(remoteBase + "GeometryDashLite.data.unityweb.part1"),
          fetchArrayBuffer(remoteBase + "GeometryDashLite.data.unityweb.part2"),
          fetchArrayBuffer(remoteBase + "GeometryDashLite.wasm.code.unityweb.part1"),
          fetchArrayBuffer(remoteBase + "GeometryDashLite.wasm.framework.unityweb.part1"),
        ]);

        const dataUrl = URL.createObjectURL(
          new Blob([concatArrayBuffers([data1, data2])], { type: "application/octet-stream" })
        );
        const wasmCodeUrl = URL.createObjectURL(
          new Blob([wasmCode1], { type: "application/octet-stream" })
        );
        const wasmFrameworkUrl = URL.createObjectURL(
          new Blob([wasmFramework1], { type: "application/octet-stream" })
        );

        const configRes = await fetch("Build/GeometryDashLite.json", { cache: "no-cache" });
        if (!configRes.ok) throw new Error("Failed to load local GeometryDashLite.json");
        const config = await configRes.json();
        config.dataUrl = dataUrl;
        config.wasmCodeUrl = wasmCodeUrl;
        config.wasmFrameworkUrl = wasmFrameworkUrl;

        const configBlobUrl = URL.createObjectURL(
          new Blob([JSON.stringify(config)], { type: "application/json" })
        );

        // Keep the loader outside #gameContainer so UnityLoader doesn't wipe it.
        UnityLoader.instantiate("gameContainer", configBlobUrl, {
          onProgress: UnityProgress,
        });
      }

      start().catch((err) => {
        console.error(err);
        showError(String(err?.message || err));
        setStageText("Failed");
      });
    })();
  </script>
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                let buttondiv = document.getElementsByTagName('button');
                for (let i = 0; i < buttondiv.length; i++) {
                    if (buttondiv[i].innerHTML == "OK") {
                        buttondiv[i].click();
                    }
                }
                setTimeout(function() {
                    let buttonok = document.getElementsByTagName('button');
                    for (let i = 0; i < buttondiv.length; i++) {
                        if (buttonok[i].innerHTML == "OK") {
                            buttonok[i].click();
                        }
                    }
                }, 1000);
            });
        </script>
</body>

</html>
