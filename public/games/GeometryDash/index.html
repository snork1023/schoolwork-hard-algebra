<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <base href="https://geometrydash-lite.io/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Geometry Dash</title>
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self' https://geometrydash-lite.io/ blob: data:;
    script-src 'self' 'unsafe-inline' 'unsafe-eval' https://geometrydash-lite.io/ blob:;
    style-src 'self' 'unsafe-inline' https://geometrydash-lite.io/;
    img-src 'self' https://geometrydash-lite.io/ data: blob:;
    connect-src 'self' https://geometrydash-lite.io/ blob: data:;
    media-src 'self' https://geometrydash-lite.io/ blob: data:;
    font-src 'self' https://geometrydash-lite.io/ data:;
    worker-src 'self' blob:;
  ">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #231F20; }
    #gameContainer { width: 100%; height: 100%; }
    #loader {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #231F20; z-index: 10;
    }
    #loader .logo { width: 200px; margin-bottom: 20px; }
    #loader .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress { display: none; width: 200px; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; overflow: hidden; }
    .full { width: 100%; height: 100%; background: #4CAF50; transform-origin: left; transform: scaleX(0); transition: transform 0.2s; }
    canvas { width: 100% !important; height: 100% !important; }
  </style>
</head>
<body>
  <div id="gameContainer"></div>
  <div id="loader">
    <img class="logo" src="images/OS3VLR5g1FVB.png" alt="Loading">
    <div class="spinner"></div>
    <div class="progress"><div class="full"></div></div>
  </div>

  <script>
    // Unity callback stubs
    function UnityCallPlayJs() {}
    function UnityCallAgainJs() {}
    function UnityCallReturnHomeJs() {}
    function UnityCallChooseLevelJs() {}
    function UnityCallCloseLeaderboardJs() {}
    function UnityCallChooseCharacterJs() {}
    function UnityCallChooseColorJs() {}
    function UnityCallEndgameJs() {}
    function UnityCallContinueJs() {}
    function UnityCallChangeModeJs() {}
    function UnityCallPauseGameJs() {}
    function UnityCallChangeLevelJs() {}
    function UnityCallLevelUpJs() {}
  </script>

  <script src="js/WoTRMyLir1QQ.js"></script>
  <script>
    UnityLoader.compatibilityCheck = function(e, t, r) { t(); };
    var gameInstance = UnityLoader.instantiate("gameContainer", "/game/lite/Build/geov9.json", {
      onProgress: function(gameInstance, progress) {
        if (!gameInstance.Module) return;
        var loader = document.querySelector("#loader");
        if (!gameInstance.progress) {
          var progressEl = document.querySelector("#loader .progress");
          progressEl.style.display = "block";
          gameInstance.progress = progressEl.querySelector(".full");
          loader.querySelector(".spinner").style.display = "none";
        }
        gameInstance.progress.style.transform = "scaleX(" + progress + ")";
        if (progress === 1 && !gameInstance.removeTimeout) {
          gameInstance.removeTimeout = setTimeout(function() {
            loader.style.display = "none";
          }, 2000);
        }
      }
    });
  </script>
</body>
</html>
